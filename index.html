<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Fantástica Carpintaria - Jogo Educativo</title>
    <!-- <script defer src="https://x9.box.bananabanana.me/script.js" data-website-id="fb67d9dc-f4d6-4e41-ab1a-46cd7c16d0e6"></script> -->
    <script prod defer src="https://x9.box.bananabanana.me/script.js" data-website-id="525cab41-79c0-4c7e-8e01-af0e75c5683f"></script>
    <style>
      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      #root {
        display: flex;
        width: 100%;
        height: 100%;
        justify-content: center;
      }
      .loader {
        background: #c18257ff;
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      .loader svg {
        fill: #fbf2d7;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader">
        <svg width="50" viewbox="0 0 20 20">
          <style>
            #rect1662 {
              animation: square-spin-1662 3s 0s cubic-bezier(.09, .57, .49, .9) infinite;
              transform-origin: 50% 50%;
              fill: #fbf2d7;
            }
            @keyframes square-spin-1662 {
                25% { transform: rotateX(180deg) rotateY(0); }
                50% { transform: rotateX(180deg) rotateY(180deg); }
                75% { transform: rotateX(0) rotateY(180deg); }
                100% { transform: rotateX(0) rotateY(0); }
              }
            </style>
            <rect width="20" height="20" fill="currentColor" id="rect1662"/>
          </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
